services:
  - type: web
    name: linux-vps
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free          # vagy "starter" a jobb teljesítményért
    region: frankfurt    # EU régió (közelebb hozzád)
    envVars:
      # Web terminal belépési adatok
      - key: WEB_USER
        value: admin
      - key: WEB_PASS
        generateValue: true   # Render generál egy random jelszót
    healthCheckPath: /
