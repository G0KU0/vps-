[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid

# ── Nginx ──
[program:nginx]
command=/usr/sbin/nginx -g "daemon off;"
autostart=true
autorestart=true
priority=10

# ── Web Terminal (ttyd) ──
[program:ttyd]
command=/usr/local/bin/ttyd -p 7681 bash -l
autostart=true
autorestart=true
priority=20

# ── Dropbear SSH (PAM nélkül, konténer-barát!) ──
[program:dropbear]
command=/usr/sbin/dropbear -F -E -p 22 -R -B
autostart=true
autorestart=true
priority=30
startsecs=2
startretries=10

# ── Bore SSH Tunnel ──
[program:bore]
command=/usr/local/bin/bore local 22 --to bore.pub
autostart=true
autorestart=true
stdout_logfile=/var/log/bore.log
stderr_logfile=/var/log/bore.log
priority=40
startsecs=3
startretries=999

# ── SFTP Info Frissítő ──
[program:sftp-updater]
command=/usr/local/bin/update-sftp.sh
autostart=true
autorestart=true
priority=50
