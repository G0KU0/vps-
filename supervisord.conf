[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid

# ── SSH Szerver ──
[program:sshd]
command=/usr/sbin/sshd -D -e
autostart=true
autorestart=true
stdout_logfile=/var/log/sshd.log
stderr_logfile=/var/log/sshd_error.log
priority=10

# ── Nginx Webszerver ──
[program:nginx]
command=/usr/sbin/nginx -g "daemon off;"
autostart=true
autorestart=true
stdout_logfile=/var/log/nginx.log
stderr_logfile=/var/log/nginx_error.log
priority=20

# ── SSH Tunnel (bore.pub) ──
[program:bore]
command=/usr/local/bin/bore local 22 --to bore.pub
autostart=true
autorestart=true
startsecs=5
startretries=999
stdout_logfile=/var/log/bore.log
stderr_logfile=/var/log/bore.log
priority=30

# ── Tunnel Info Frissítő ──
[program:tunnel-updater]
command=/usr/local/bin/update-tunnel.sh
autostart=true
autorestart=true
priority=40
